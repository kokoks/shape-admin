version: '3.8'

services:
  db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: shapeadmin
      MYSQL_USER: admin
      MYSQL_PASSWORD: adminpass
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  app:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=admin
      - DB_PASSWORD=adminpass
      - DB_NAME=shapeadmin
      - ADMIN_EMAIL=admin@admin.ru
      - ADMIN_PASSWORD=111111
    volumes:
      - ./dbBackup:/app/dbBackup
      - ./backups:/app/backups
      - ./config:/app/config
    depends_on:
      - db

volumes:
  db_data: